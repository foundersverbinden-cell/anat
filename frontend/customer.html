<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestMarket - Buy Vibes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="nav-brand">FestMarket 🎪</a>
        <div>
            <button class="btn btn-outline btn-small" onclick="api.logout()">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <!-- Products View -->
        <div id="products-view">
            <div class="glass-panel" style="margin-bottom: 2rem;">
                <div class="d-flex justify-between" style="align-items: center; flex-wrap: wrap;">
                    <h2 class="section-title" style="margin-bottom: 0;">Browse Vibe Catalog</h2>
                    <div style="display: flex; gap: 1rem; align-items: center; flex: 1; min-width: 300px; justify-content: flex-end;">
                        <input type="text" id="product-search" placeholder="🔍 Search products..." oninput="filterProducts()" style="max-width: 300px;">
                        <button class="btn btn-primary btn-small" onclick="toggleView('orders-view')" style="width: auto;">📋 My Orders</button>
                    </div>
                </div>
            </div>
            
            <div class="grid" id="products-grid">
                <!-- Products dynamically loaded here -->
            </div>
        </div>
        
        <!-- Orders View -->
        <div id="orders-view" class="hidden">
            <div class="d-flex justify-between" style="align-items: center; margin-bottom: 2rem;">
                <h2>My Orders</h2>
                <button class="btn btn-outline btn-small" onclick="toggleView('products-view')">Back to Shop</button>
            </div>
            <div class="grid" id="orders-grid">
                <!-- Orders dynamically loaded here -->
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/customer.js"></script>
</body>
</html>
