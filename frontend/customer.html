<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aivore - Buy Vibes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="customer.html" class="nav-brand">
                <img src="assets/logo.png" alt="Aivore Logo" style="height: 35px; margin-right: 10px;">
                <span class="neon-text-primary">Aivore</span>
            </a>
            
            <button class="nav-toggle" onclick="api.toggleMobileMenu()">☰</button>
            
            <div class="nav-links" id="nav-links">
                <a href="#" onclick="toggleView('products-view')" class="nav-link">Shop</a>
                <a href="#" onclick="toggleView('orders-view')" class="nav-link">My Orders</a>
                <button class="btn btn-outline btn-small" onclick="api.logout()">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <!-- Products View -->
        <div id="products-view">
            <!-- Intent Selection Section -->
            <div class="intent-section">
                <h3 class="intent-title">What vibe are you looking for?</h3>
                <div class="intent-chips" id="intent-chips">
                    <div class="chip" onclick="filterByIntent('healthy', this)">
                        <span class="chip-emoji">🍃</span> Healthy
                    </div>
                    <div class="chip" onclick="filterByIntent('budget', this)">
                        <span class="chip-emoji">💸</span> Budget
                    </div>
                    <div class="chip" onclick="filterByIntent('fast', this)">
                        <span class="chip-emoji">⚡</span> Fast
                    </div>
                    <div class="chip" onclick="filterByIntent('premium', this)">
                        <span class="chip-emoji">✨</span> Premium
                    </div>
                    <div class="chip" onclick="filterByIntent('trending', this)">
                        <span class="chip-emoji">🔥</span> Trending
                    </div>
                    <div class="chip" onclick="filterByIntent('custom', this)">
                        <span class="chip-emoji">🎯</span> Custom
                    </div>
                </div>
            </div>

            <!-- New Inline Vibe Assistant Panel -->
            <div class="vibe-assistant-panel glass-panel">
                <div class="assistant-header">
                    <h2 class="neon-text-main">✨ Vibe Assistant</h2>
                    <p style="color:var(--text-muted); font-size: 0.9rem;">Your personal guided decision engine.</p>
                </div>
                
                <div class="assistant-input-wrapper">
                    <input type="text" id="assistant-input" placeholder="What vibe do you want? (e.g. healthy protein, spicy snacks)" onkeypress="if(event.key === 'Enter') sendAssistantQuery()">
                    <button class="btn btn-primary" onclick="sendAssistantQuery()">Guide Me</button>
                </div>

                <div class="quick-filters">
                    <span class="label" style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Quick Filters:</span>
                    <div class="filter-chips">
                        <div class="chip chip-small" onclick="applyQuickFilter('under100')">Under ₹100</div>
                        <div class="chip chip-small" onclick="applyQuickFilter('trending')">Trending</div>
                        <div class="chip chip-small" onclick="applyQuickFilter('protein')">High Protein</div>
                        <div class="chip chip-small" onclick="applyQuickFilter('budget')">Budget Picks</div>
                    </div>
                </div>

                <div id="assistant-status" class="assistant-status"></div>

                <div id="assistant-results" class="assistant-results-grid scroll-x">
                    <!-- Dynamic recommendations will load here -->
                </div>
            </div>

            <div class="glass-panel" style="margin-bottom: 2rem; padding: 1.5rem;">
                <div class="d-flex justify-between" style="align-items: center; flex-wrap: wrap; gap: 1.5rem;">
                    <div>
                        <h2 class="section-title" style="margin-bottom: 0.25rem;">Explore the Full Catalog</h2>
                        <p style="color:var(--text-muted); font-size: 0.85rem;">Secondary discovery for more vibes.</p>
                    </div>
                    
                    <div class="d-flex" style="gap: 1rem; align-items: center; flex: 1; min-width: 300px; justify-content: flex-end;">
                        <input type="text" id="product-search" placeholder="Search deeper..." oninput="filterProducts()" style="width: 100%; max-width: 300px; padding: 0.75rem 1.2rem; border-radius: 50px; background: rgba(0,0,0,0.2);">
                    </div>
                </div>
            </div>
            
            <div class="grid" id="products-grid">
                <!-- Products dynamically loaded here -->
            </div>
        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/customer.js"></script>
</body>
</html>
