<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestMarket - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="center-wrapper">
        <div class="glass-panel auth-box">
            <h2>FestMarket 🎪</h2>
            <p>Your one-stop festival marketplace.</p>
            
            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="student@college.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="********">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                <div class="mt-2">
                    <p>New here? <a href="#" style="color:var(--primary)" onclick="toggleAuth()">Sign up</a></p>
                </div>
            </div>

            <div id="signup-form" class="hidden">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="student@college.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="********">
                </div>
                <div class="form-group">
                    <label>I am a...</label>
                    <select id="signup-role">
                        <option value="customer">Customer (Buy vibes)</option>
                        <option value="seller">Seller (Sell vibes)</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="handleSignup()">Sign Up</button>
                <div class="mt-2">
                    <p>Already have an account? <a href="#" style="color:var(--primary)" onclick="toggleAuth()">Login</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
