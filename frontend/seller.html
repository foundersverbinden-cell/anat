<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestMarket - Seller Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass-panel" style="border-radius: 0; border:none; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100;">
        <div class="container d-flex justify-between" style="align-items: center; padding: 0.5rem 2rem; width: 100%; max-width: 1400px; margin:0 auto;">
            <a href="seller.html" class="nav-brand" style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="font-size: 1.8rem;">🎪</span>
                <span class="neon-text-primary">FestMarket</span>
                <span style="font-size: 0.8rem; background: var(--secondary); padding: 2px 6px; border-radius: 4px; margin-left: 0.5rem;">Seller Hub</span>
            </a>
            
            <div class="nav-links d-flex" style="gap: 1.5rem; align-items: center;">
                <span id="seller-name-display" style="font-weight: 600; color: var(--text-muted);">Seller</span>
                <button class="btn btn-outline btn-small" onclick="api.logout()">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container" style="max-width: 1400px; margin-top: 2rem; padding: 0 2rem;">
        <!-- Stats Dashboard -->
        <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem;">
            <div class="glass-panel" style="padding: 1.5rem;">
                <p style="color:var(--text-muted); font-size: 0.9rem;">Total Revenue</p>
                <h2 id="stat-revenue" style="font-size: 2rem; margin: 0.5rem 0;" class="neon-text-primary">₹0</h2>
                <p style="color:var(--success); font-size: 0.8rem;">Real-time balance</p>
            </div>
            <div class="glass-panel" style="padding: 1.5rem;">
                <p style="color:var(--text-muted); font-size: 0.9rem;">Total Orders</p>
                <h2 id="stat-orders" style="font-size: 2rem; margin: 0.5rem 0;">0</h2>
                <p style="color:var(--text-muted); font-size: 0.8rem;">Vibes secured</p>
            </div>
            <div class="glass-panel" style="padding: 1.5rem;">
                <p style="color:var(--text-muted); font-size: 0.9rem;">Total Views</p>
                <h2 id="stat-views" style="font-size: 2rem; margin: 0.5rem 0;" class="neon-text-secondary">0</h2>
                <p style="color:var(--accent-blue); font-size: 0.8rem;">Global reach</p>
            </div>
            <div class="glass-panel" style="padding: 1.5rem;">
                <p style="color:var(--text-muted); font-size: 0.9rem;">Seller Rating</p>
                <h2 style="font-size: 2rem; margin: 0.5rem 0; color: var(--warning);">⭐ 4.9</h2>
                <p style="color:var(--text-muted); font-size: 0.8rem;">Vibe Master status</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 3rem;">
            <!-- Sidebar: Add Product -->
            <div>
                <div class="glass-panel" style="position: sticky; top: 100px;">
                    <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Add New Vibe</h2>
                    <form id="add-vibe-form">
                        <div class="form-group">
                            <label>Vibe Name</label>
                            <input type="text" id="prod-name" placeholder="E.g. Neon Glowstick">
                        </div>
                        <div class="form-group">
                            <label>Price (₹)</label>
                            <input type="number" id="prod-price" placeholder="499">
                        </div>
                        <div class="form-group">
                            <label>UPI ID for Payments</label>
                            <input type="text" id="prod-upi" placeholder="vibe@upi">
                        </div>
                        <div class="form-group">
                            <label>Vibe Visual (Image)</label>
                            <input type="file" id="prod-image" accept="image/*" style="padding: 0.5rem 0;">
                        </div>
                        <div class="form-group">
                            <label>Description & Vibe</label>
                            <textarea id="prod-desc" rows="4" placeholder="What's the energy of this product?"></textarea>
                        </div>
                        <button type="button" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;" onclick="addProduct()">✨ Launch Vibe</button>
                    </form>
                </div>
            </div>

            <!-- Main Content: Products & Orders -->
            <div>
                <section style="margin-bottom: 4rem;">
                    <h2 class="section-title">My Active Products</h2>
                    <div id="seller-products-grid" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                        <p>Loading your catalog...</p>
                    </div>
                </section>

                <section>
                    <h2 class="section-title">Order Management</h2>
                    <div id="seller-orders-grid" class="grid" style="grid-template-columns: 1fr;">
                        <p>Loading incoming orders...</p>
                    </div>
                </section>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/seller.js"></script>
</body>
</html>
