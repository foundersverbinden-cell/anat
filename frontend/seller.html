<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestMarket - Seller Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="nav-brand">FestMarket 🎪 Seller</a>
        <div>
            <button class="btn btn-outline btn-small" onclick="api.logout()">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <!-- Add Product -->
        <div class="glass-panel" style="margin-top: 2rem;">
            <h2 style="color: var(--secondary); margin-bottom: 1.5rem;">Add New Product</h2>
            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" placeholder="E.g. Fest T-Shirt">
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="prod-price" placeholder="499">
                </div>
                <div class="form-group">
                    <label>Your UPI ID</label>
                    <input type="text" id="prod-upi" placeholder="seller@upi">
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="prod-image" accept="image/*" style="padding: 0.5rem 0;">
                </div>
            </div>
            <button class="btn btn-primary mt-2" onclick="addProduct()">Add Product</button>
        </div>

        <h2 class="section-title" style="margin-top: 3rem;">My Products</h2>
        <div id="seller-products-grid" class="grid">
            <!-- Products will be loaded here -->
        </div>

        <h2 class="section-title" style="margin-top: 3rem;">Manage Orders</h2>
        <div id="seller-orders-grid" class="grid">
            <p>Loading orders...</p>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/seller.js"></script>
</body>
</html>
