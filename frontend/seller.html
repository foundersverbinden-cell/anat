<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestMarket - Seller Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="nav-brand">FestMarket 🎪 Seller</a>
        <div>
            <button class="btn btn-outline btn-small" onclick="api.logout()">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <!-- Add Product -->
        <div class="glass-panel" style="margin-bottom: 3rem;">
            <h2>Add New Product</h2>
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" placeholder="E.g. Fest T-Shirt">
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="prod-price" placeholder="499">
                </div>
                <div class="form-group">
                    <label>Your UPI ID</label>
                    <input type="text" id="prod-upi" placeholder="seller@upi">
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="prod-image" accept="image/*" style="padding: 0;">
                </div>
            </div>
            <button class="btn btn-primary" style="width: auto; margin-top: 1rem;" onclick="addProduct()">Add Product</button>
        </div>

        <!-- Orders -->
        <h2>Manage Orders</h2>
        <div class="grid" id="seller-orders-grid">
            <!-- Orders load here -->
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/seller.js"></script>
</body>
</html>
